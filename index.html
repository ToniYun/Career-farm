<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Farm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080806;
  --surface: #0d0c09;
  --surface2: #161410;
  --border: rgba(255,176,0,0.16);
  --border-hi: rgba(255,176,0,0.42);
  --text: #e8d5a0;
  --text2: rgba(232,213,160,0.42);
  --amber: #ffb000;
  --amber-dim: rgba(255,176,0,0.6);
  --amber-glow: rgba(255,176,0,0.12);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.6);
  --green-glow: rgba(0,255,136,0.12);
  --red: #ff3040;
  --red-dim: rgba(255,48,64,0.6);
  --red-glow: rgba(255,48,64,0.12);
  --blue: #29b6f6;
  --yellow: #ffd54f;
  --purple: #ce93d8;
  --accent: #ff7043;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.025) 0px,
    rgba(0,0,0,0.025) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border-hi);
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
header::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--amber) 30%, var(--amber) 70%, transparent);
  opacity: 0.5;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--amber);
  text-shadow: 0 0 14px rgba(255,176,0,0.5);
}

/* ── Main content ── */
main {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,176,0,0.2); }
::-webkit-scrollbar-thumb:hover { background: rgba(255,176,0,0.4); }

/* ── Grid ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 1px solid rgba(255,176,0,0.22);
  padding: 16px;
  position: relative;
  transition: border-color .2s;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 40px; height: 1px;
  background: var(--amber);
  opacity: 0.6;
}
.card:hover { border-color: var(--border-hi); }

.card-title {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 10px;
}
.card-value {
  font-size: 24px;
  color: var(--amber);
  text-shadow: 0 0 12px rgba(255,176,0,0.3);
  letter-spacing: -0.5px;
}
.card-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 6px 10px;
  font-size: 9px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--amber-dim);
  border-bottom: 1px solid var(--border-hi);
}
td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,176,0,0.03); }

/* ── Colors ── */
.pos { color: var(--green); }
.neg { color: var(--red); }

.spacer { height: 12px; }
.spinner { color: var(--text2); padding: 20px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

/* ── Recruiter / Career Farm ── */
.rc-task-list { display: flex; flex-direction: column; gap: 1px; }
.rc-task { display: flex; align-items: flex-start; gap: 10px; padding: 9px 8px; cursor: pointer; transition: background .12s; border: 1px solid transparent; }
.rc-task:hover { background: var(--surface2); border-color: var(--border); }
.rc-task.done { opacity: 0.5; }
.rc-task.done .rc-task-label { text-decoration: line-through; color: var(--text2); }
.rc-task-check { width: 18px; height: 18px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--green); flex-shrink: 0; margin-top: 2px; }
.rc-task.done .rc-task-check { background: var(--green-glow); border-color: var(--green); }
.rc-task-body { flex: 1; min-width: 0; }
.rc-task-label { font-size: 12px; color: var(--text); }
.rc-task-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }
.rc-task-reward { font-size: 11px; color: var(--amber); white-space: nowrap; flex-shrink: 0; }
.rc-upg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rc-upg { display: flex; align-items: flex-start; gap: 10px; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-left-width: 2px; }
.rc-upg-icon { font-size: 20px; flex-shrink: 0; line-height: 1.2; }
.rc-upg-body { flex: 1; min-width: 0; }
.rc-upg-name { font-size: 12px; color: var(--text); }
.rc-upg-level { font-size: 10px; color: var(--text2); }
.rc-upg-desc { font-size: 11px; color: var(--text2); margin: 2px 0; }
.rc-upg-next { font-size: 11px; color: var(--green); }
.rc-upg-btn { flex-shrink: 0; align-self: center; padding: 4px 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; white-space: nowrap; transition: border-color .12s; }
.rc-upg-btn:hover:not([disabled]):not(.maxed) { border-color: var(--amber-dim); color: var(--amber); }
.rc-upg-btn[disabled] { opacity: 0.3; cursor: not-allowed; }
.rc-upg-btn.maxed { color: var(--green); border-color: var(--green-dim); cursor: default; background: var(--green-glow); }
.rc-upg-bar-wrap { height: 2px; background: rgba(255,255,255,0.06); margin-top: 5px; }
.rc-upg-bar-fill { height: 100%; transition: width .4s ease; }

/* ── Farm scene animations ── */
@keyframes rc-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes rc-roll { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
@keyframes rc-hatch-pop {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  55%  { opacity: 1; transform: translateY(-28px) scale(1.35); }
  100% { opacity: 0; transform: translateY(-46px) scale(0.85); }
}
@keyframes rc-glow-pulse {
  0%, 100% { filter: drop-shadow(0 0 0px rgba(0,255,136,0)); }
  50%       { filter: drop-shadow(0 0 7px rgba(0,255,136,0.75)); }
}
@keyframes rc-star-twinkle {
  0%, 100% { opacity: 0.18; transform: scale(1); }
  50%       { opacity: 0.65; transform: scale(1.35); }
}
@keyframes amber-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,176,0,0); }
  50%       { box-shadow: 0 0 8px 2px rgba(255,176,0,0.25); }
}
@keyframes green-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
  50%       { box-shadow: 0 0 8px 2px rgba(0,255,136,0.3); }
}
@keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
#farm-content { animation: fade-in 0.18s ease both; }

.rc-chicken-sprite { position: absolute; bottom: 32px; font-size: 18px; line-height: 1; user-select: none; pointer-events: none; animation: rc-bob var(--bob-dur,1.2s) ease-in-out infinite; animation-delay: var(--bob-delay,0s); }
.rc-egg-sprite { display: inline-block; animation: rc-roll var(--roll-dur,2s) ease-in-out infinite; animation-delay: var(--roll-delay,0s); }
.rc-eggs-glow { animation: rc-glow-pulse 2.2s ease-in-out infinite; display: inline-block; }

/* ── Mobile ── */
@media (max-width: 640px) {
  .grid2 { grid-template-columns: 1fr; }
  header { padding: 0 14px; }
  main { padding: 14px; }
  .rc-upg-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🐔 Career Farm</div>
</header>

<main>
  <div id="farm-content"><div class="spinner">Loading…</div></div>
</main>

<script>
// ─── CAREER FARM ──────────────────────────────────────────────────────────────
const RC_DAILY = [
  { id:'d1', label:'Send 3 outreach messages',            desc:'Cold email, LinkedIn DM, or referral ask',              chickens:4 },
  { id:'d2', label:'Research 2 target companies',         desc:'Their stack, culture, and open roles',                  chickens:3 },
  { id:'d3', label:'Practice a STAR story out loud',      desc:'Pick one behavioral question and rehearse it',          chickens:3 },
  { id:'d4', label:'Shortlist 3 new job postings',        desc:'Find and save 3 roles worth applying to',               chickens:2 },
  { id:'d5', label:'Read 1 industry article',             desc:'Stay current on trends in your field',                  chickens:2 },
  { id:'d6', label:'Log a recent win to resume/LinkedIn', desc:'Add metrics, a new project, or updated skills',         chickens:4 },
];
const RC_WEEKLY = [
  { id:'w1', label:'Submit 5+ quality applications',      desc:'Tailored, not spray-and-pray',                          chickens:15 },
  { id:'w2', label:'Complete a mock interview',           desc:'Technical or behavioral — record yourself if possible', chickens:12 },
  { id:'w3', label:'Conduct an informational interview',  desc:'Schedule or complete a coffee chat',                    chickens:10 },
  { id:'w4', label:'Follow up on pending applications',   desc:'Any application >1 week without a response',            chickens:8  },
  { id:'w5', label:'Tailor resume for a dream role',      desc:'Customize bullets and skills for a specific JD',        chickens:10 },
  { id:'w6', label:'Expand your network',                 desc:'Connect with 5 new relevant people on LinkedIn',        chickens:7  },
];
const RC_TIERS = [
  { name:'Backyard Coop',        icon:'🏠', min:0   },
  { name:'Small Farm',           icon:'🌾', min:10  },
  { name:'Ranch',                icon:'🏡', min:30  },
  { name:'Enterprise Farm',      icon:'🏭', min:80  },
  { name:'Mega Corp',            icon:'🌆', min:200 },
  { name:'Global Egg Syndicate', icon:'🌍', min:500 },
];
const RC_UPGRADES = [
  { id:'hatchBoost',     name:'Hatch Booster',         desc:'More chickens hatch per task',             icon:'🐣', maxLevel:5, costs:[25,80,200,500,1200],   labels:['+1/task','+2/task','+3/task','+5/task','+8/task']    },
  { id:'feedQuality',    name:'Premium Feed',           desc:'Chickens produce eggs faster',             icon:'🌾', maxLevel:5, costs:[30,100,300,750,2000],  labels:['×1.25','×1.6','×2.0','×2.5','×3.0']                 },
  { id:'coopExpansion',  name:'Coop Expansion',         desc:'Raise your max chicken capacity',          icon:'🏠', maxLevel:5, costs:[50,150,400,1000,2500], labels:['Cap:100','Cap:200','Cap:500','Cap:1k','Cap:∞']        },
  { id:'researchLab',    name:'Career Research Lab',    desc:'Bonus chickens from weekly tasks',         icon:'🔬', maxLevel:3, costs:[120,400,1200],         labels:['+3 weekly','+6 weekly','+12 weekly']                 },
];

function rcLoad() { try { return JSON.parse(localStorage.getItem('rc_state') || '{}'); } catch { return {}; } }
function rcSave(s) { s._savedAt = Date.now(); localStorage.setItem('rc_state', JSON.stringify(s)); }
function rcSyncToServer(s) { fetch('/api/state', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(s) }).catch(()=>{}); }
function rcSaveAndSync(s) { rcSave(s); rcSyncToServer(s); }
async function rcInitSync() {
  try {
    const resp = await fetch('/api/state');
    if (!resp.ok) return;
    const serverState = await resp.json();
    if (!serverState || serverState.error) return;
    const localState = rcLoad();
    const serverAt = serverState._savedAt || 0;
    const localAt  = localState._savedAt  || 0;
    if (serverAt > localAt) {
      localStorage.setItem('rc_state', JSON.stringify(serverState));
      renderRecruiter();
    } else if (localAt > serverAt) {
      rcSyncToServer(localState);
    }
  } catch (_) {}
}
function rcToday() { return new Date().toISOString().slice(0,10); }
function rcWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const w = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(w).padStart(2,'0')}`;
}
function rcTier(chickens) { let t = RC_TIERS[0]; for (const tier of RC_TIERS) { if (chickens >= tier.min) t = tier; } return t; }
function rcChickenCap(upgrades) { return [50, 100, 200, 500, 1000, Infinity][(upgrades.coopExpansion || 0)]; }
function rcEggsPerSec(chickens, upgrades) { const mults = [1, 1.25, 1.6, 2.0, 2.5, 3.0]; return chickens * 0.1 * mults[(upgrades.feedQuality || 0)]; }
function rcChickensForTask(task, upgrades, isWeekly) { const boostBonus = [0,1,2,3,5,8]; const labBonus = [0,3,6,12]; return task.chickens + boostBonus[upgrades.hatchBoost||0] + (isWeekly ? labBonus[upgrades.researchLab||0] : 0); }
function rcTickEggs(s) {
  const now = Date.now();
  const last = s.lastEggTime || now;
  const elapsed = Math.min((now - last) / 1000, 3600);
  if (elapsed > 0 && (s.chickens || 0) > 0) { const earned = rcEggsPerSec(s.chickens, s.upgrades || {}) * elapsed; s.eggs = (s.eggs || 0) + earned; s.eggsTotal = (s.eggsTotal || 0) + earned; }
  s.lastEggTime = now;
}
function rcMigrate(s) {
  if ((s.xp || 0) > 0 && !(s.chickens > 0)) { s.chickens = Math.floor(s.xp / 5); s.eggs = (s.eggs || 0) + s.chickens * 2; delete s.xp; }
  if (!s.upgrades) s.upgrades = {};
  if (!s.lastEggTime) s.lastEggTime = Date.now();
  return s;
}

function rcToggleTask(type, id) {
  let s = rcLoad(); s = rcMigrate(s); rcTickEggs(s);
  const today = rcToday(), week = rcWeekKey();
  const isWeekly = type === 'weekly';
  const list = isWeekly ? RC_WEEKLY : RC_DAILY;
  const storeKey = isWeekly ? 'weekly' : 'daily';
  const timeKey  = isWeekly ? week : today;
  const task = list.find(t => t.id === id);
  if (!task) return;
  const tasks = s[storeKey] || {};
  const k = `${timeKey}:${id}`;
  const cap = rcChickenCap(s.upgrades);
  let spawnedCount = 0;
  if (tasks[k]) {
    const spawned = (typeof tasks[k] === 'object') ? (tasks[k].chickens || 0) : 0;
    s.chickens = Math.max(0, (s.chickens || 0) - spawned);
    delete tasks[k];
    s.log = (s.log || []).filter(e => e.key !== k);
  } else {
    const spawned = Math.min(rcChickensForTask(task, s.upgrades, isWeekly), Math.max(0, cap - (s.chickens || 0)));
    s.chickens = (s.chickens || 0) + spawned;
    tasks[k] = { chickens: spawned };
    s.log = [{ key:k, date:today, label:task.label, chickens:spawned }, ...(s.log || [])].slice(0, 50);
    spawnedCount = spawned;
  }
  s[storeKey] = tasks; rcSaveAndSync(s); renderRecruiter();
  if (spawnedCount > 0) rcShowHatchFloat(spawnedCount);
}

function rcShowHatchFloat(n) {
  const scene = document.querySelector('.rc-farm-scene');
  if (!scene) return;
  const el = document.createElement('div');
  el.textContent = `+${n} 🐔`;
  const left = 18 + Math.random() * 46;
  el.style.cssText = `position:absolute;left:${left}%;bottom:48px;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:#ffb000;pointer-events:none;animation:rc-hatch-pop 0.85s ease-out forwards;z-index:20;white-space:nowrap;text-shadow:0 0 8px rgba(255,176,0,0.7)`;
  scene.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function rcBuyUpgrade(id) {
  let s = rcLoad(); s = rcMigrate(s); rcTickEggs(s);
  const upg = RC_UPGRADES.find(u => u.id === id);
  if (!upg) return;
  const currentLevel = s.upgrades[id] || 0;
  if (currentLevel >= upg.maxLevel) return;
  const cost = upg.costs[currentLevel];
  if ((s.eggs || 0) < cost) return;
  s.eggs -= cost; s.upgrades[id] = currentLevel + 1;
  rcSaveAndSync(s); renderRecruiter();
}

function renderRecruiter() {
  let s = rcLoad(); s = rcMigrate(s); rcTickEggs(s); rcSave(s);

  const today = rcToday(), week = rcWeekKey();
  const daily = s.daily || {}, weekly = s.weekly || {};
  const chickens = s.chickens || 0;
  const eggs = s.eggs || 0;
  const upgrades = s.upgrades || {};
  const eggsPerSec = rcEggsPerSec(chickens, upgrades);
  const cap = rcChickenCap(upgrades);
  const tier = rcTier(chickens);
  const tierIdx = RC_TIERS.indexOf(tier);
  const nextTier = RC_TIERS[tierIdx + 1] || null;
  const tierPct = nextTier ? Math.round((chickens - tier.min) / (nextTier.min - tier.min) * 100) : 100;
  const dailyDone  = RC_DAILY.filter(t => daily[`${today}:${t.id}`]).length;
  const weeklyDone = RC_WEEKLY.filter(t => weekly[`${week}:${t.id}`]).length;
  const fmtEggs = n => n >= 10000 ? `${(n/1000).toFixed(1)}k` : n.toFixed(1);

  const themes = [
    { sky:'linear-gradient(180deg,#0f0a05 0%,#2a1808 100%)', ground:'#3d2a0a', gb:'#5a3d10', barn:'#7a4a2a', roof:'#5a3520', silo:'#5a4520' },
    { sky:'linear-gradient(180deg,#050d05 0%,#0a1c09 100%)', ground:'#1e3d10', gb:'#2a5818', barn:'#8b3a3a', roof:'#6b2a2a', silo:'#556630' },
    { sky:'linear-gradient(180deg,#040d05 0%,#091e09 100%)', ground:'#1a4a18', gb:'#286820', barn:'#9b4a2a', roof:'#7b3820', silo:'#407040' },
    { sky:'linear-gradient(180deg,#060810 0%,#0c1020 100%)', ground:'#1a1a2e', gb:'#282848', barn:'#4a5a6a', roof:'#383858', silo:'#445566' },
    { sky:'linear-gradient(180deg,#08040f 0%,#14081e 100%)', ground:'#1a0a2e', gb:'#2a1848', barn:'#5a3a7a', roof:'#3a2868', silo:'#444470' },
    { sky:'linear-gradient(180deg,#0f0900 0%,#241400 100%)', ground:'#2a1800', gb:'#4a2c00', barn:'#8a7000', roof:'#5a4800', silo:'#706000' },
  ];
  const th = themes[tierIdx] || themes[0];

  const starCounts = [0, 0, 5, 8, 14, 18];
  const numStars = starCounts[tierIdx] || 0;
  const starHTML = Array.from({length: numStars}, (_, i) => {
    const top  = 5  + (i * 17 % 50);
    const left = 3  + (i * 23 % 80);
    const dur  = (2 + (i * 0.4 % 2)).toFixed(1);
    const del  = (-(i * 0.7 % 3)).toFixed(1);
    return `<span style="position:absolute;top:${top}%;left:${left}%;font-size:6px;color:#fff;user-select:none;pointer-events:none;animation:rc-star-twinkle ${dur}s ease-in-out infinite;animation-delay:${del}s">★</span>`;
  }).join('');

  const numChickens = Math.min(chickens, 14);
  const chickenHTML = Array.from({length: numChickens}, (_, i) => {
    const left = 4 + (i * 73 % 58);
    const dur  = (1.0 + i * 0.18 % 0.6).toFixed(2);
    const del  = (-(i * 0.37 % 1.5)).toFixed(2);
    return `<span class="rc-chicken-sprite" style="left:${left}%;--bob-dur:${dur}s;--bob-delay:${del}s">🐔</span>`;
  }).join('');

  const numEggSprites = Math.min(Math.floor(Math.log2(eggs + 1)), 9);
  const eggPileHTML = numEggSprites > 0
    ? Array.from({length: numEggSprites}, (_, i) => {
        const del = (-(i * 0.4 % 2.0)).toFixed(2);
        const sz  = i < 4 ? 14 : 11;
        return `<span class="rc-egg-sprite" style="--roll-delay:${del}s;font-size:${sz}px">🥚</span>`;
      }).join('')
    : '';

  const farmScene = `
  <div class="rc-farm-scene" style="position:relative;width:100%;height:128px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border)">
    <div style="position:absolute;inset:0;bottom:32px;background:${th.sky}"></div>
    ${starHTML}
    <div style="position:absolute;bottom:0;left:0;right:0;height:32px;background:${th.ground};border-top:2px solid ${th.gb}"></div>
    <div style="position:absolute;bottom:32px;right:88px;width:20px;height:44px;background:${th.silo};border-radius:10px 10px 0 0"></div>
    <div style="position:absolute;bottom:32px;right:30px">
      <div style="width:0;height:0;border-left:26px solid transparent;border-right:26px solid transparent;border-bottom:18px solid ${th.roof}"></div>
      <div style="width:52px;height:28px;background:${th.barn};border-radius:2px 2px 0 0;position:relative">
        <div style="position:absolute;top:6px;left:50%;transform:translateX(-50%);width:10px;height:16px;background:rgba(0,0,0,0.45);border-radius:2px 2px 0 0"></div>
      </div>
    </div>
    ${chickenHTML}
    ${eggPileHTML ? `<div style="position:absolute;bottom:30px;left:12px;display:flex;align-items:flex-end;gap:1px">${eggPileHTML}</div>` : ''}
    <div style="position:absolute;top:7px;left:10px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35)">Career Farm</div>
    <div style="position:absolute;top:6px;right:8px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.65);background:rgba(0,0,0,0.4);padding:2px 8px">${tier.icon} ${tier.name}</div>
  </div>`;

  function taskRows(type, map, list, timeKey) {
    const isWeekly = type === 'weekly';
    return list.map(t => {
      const done = !!map[`${timeKey}:${t.id}`];
      const n = rcChickensForTask(t, upgrades, isWeekly);
      return `<div class="rc-task ${done?'done':''}" onclick="rcToggleTask('${type}','${t.id}')">
        <div class="rc-task-check">${done?'✓':''}</div>
        <div class="rc-task-body">
          <div class="rc-task-label">${t.label}</div>
          <div class="rc-task-desc">${t.desc}</div>
        </div>
        <div class="rc-task-reward">🐔 +${n}</div>
      </div>`;
    }).join('');
  }

  const upgAccent = { hatchBoost:'#ffd54f', feedQuality:'#00ff88', coopExpansion:'#29b6f6', researchLab:'#ce93d8' };
  function upgradeCard(upg) {
    const level = upgrades[upg.id] || 0;
    const maxed = level >= upg.maxLevel;
    const cost = maxed ? null : upg.costs[level];
    const nextLabel = maxed ? 'Maxed out' : `Next: ${upg.labels[level]}`;
    const canAfford = !maxed && eggs >= cost;
    const accent = upgAccent[upg.id] || 'var(--text2)';
    const barPct = Math.round(level / upg.maxLevel * 100);
    return `<div class="rc-upg" style="border-left-color:${accent}88">
      <div class="rc-upg-icon">${upg.icon}</div>
      <div class="rc-upg-body">
        <div class="rc-upg-name">${upg.name} <span class="rc-upg-level">Lv ${level}/${upg.maxLevel}</span></div>
        <div class="rc-upg-desc">${upg.desc}</div>
        <div class="rc-upg-next">${nextLabel}</div>
        <div class="rc-upg-bar-wrap"><div class="rc-upg-bar-fill" style="width:${barPct}%;background:${accent}"></div></div>
      </div>
      ${maxed
        ? `<div class="rc-upg-btn maxed">✓ Max</div>`
        : `<button class="rc-upg-btn" onclick="rcBuyUpgrade('${upg.id}')" ${canAfford?'':'disabled'}>🥚 ${cost.toLocaleString()}</button>`}
    </div>`;
  }

  const log = (s.log || []).slice(0, 8);

  document.getElementById('farm-content').innerHTML = `
    ${farmScene}
    <div class="grid2" style="margin-bottom:14px">
      <div class="card">
        <div class="card-title">${tier.icon} ${tier.name}</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px">
          <span style="font-size:28px;color:var(--yellow);text-shadow:0 0 12px rgba(255,213,79,0.3)">${chickens.toLocaleString()}</span>
          <span style="color:var(--text2);font-size:11px">/ ${cap === Infinity ? '∞' : cap.toLocaleString()} chickens</span>
        </div>
        <div style="background:rgba(255,176,0,0.08);height:4px;overflow:hidden;margin-bottom:6px">
          <div style="background:var(--yellow);height:100%;width:${tierPct}%;transition:width .4s"></div>
        </div>
        <div style="font-size:11px;color:var(--text2)">
          ${nextTier
            ? `${chickens - tier.min} / ${nextTier.min - tier.min} → <strong style="color:var(--text)">${nextTier.icon} ${nextTier.name}</strong>`
            : '<span style="color:var(--green)">Max tier reached 🎉</span>'}
        </div>
      </div>
      <div class="card">
        <div class="card-title">Egg Wallet</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
          <span class="${eggsPerSec > 0 ? 'rc-eggs-glow' : ''}" style="font-size:28px;color:var(--green);text-shadow:0 0 12px rgba(0,255,136,0.3)">${fmtEggs(eggs)}</span>
          <span style="color:var(--text2);font-size:11px">eggs</span>
          ${eggsPerSec > 0 ? `<span style="font-size:10px;color:var(--green);background:var(--green-glow);padding:2px 6px;letter-spacing:1px">+${eggsPerSec.toFixed(2)}/s</span>` : ''}
        </div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">${fmtEggs(s.eggsTotal || 0)} lifetime earned</div>
        <div style="font-size:11px;color:var(--text2)">${dailyDone}/${RC_DAILY.length} daily · ${weeklyDone}/${RC_WEEKLY.length} weekly done</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">Upgrades <span style="color:var(--text2);font-size:10px;letter-spacing:1px">spend eggs to boost your farm</span></div>
      <div class="rc-upg-grid">${RC_UPGRADES.map(upgradeCard).join('')}</div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Daily Tasks <span style="color:var(--text2);font-size:10px;letter-spacing:1px">${dailyDone}/${RC_DAILY.length} · Resets midnight</span></div>
        <div class="rc-task-list">${taskRows('daily', daily, RC_DAILY, today)}</div>
      </div>
      <div class="card">
        <div class="card-title">Weekly Tasks <span style="color:var(--text2);font-size:10px;letter-spacing:1px">${weeklyDone}/${RC_WEEKLY.length} · Resets Monday</span></div>
        <div class="rc-task-list">${taskRows('weekly', weekly, RC_WEEKLY, week)}</div>
      </div>
    </div>
    ${log.length ? `
    <div class="spacer"></div>
    <div class="card">
      <div class="card-title">Activity Log</div>
      <table>
        <thead><tr><th>Date</th><th>Task</th><th>Hatched</th></tr></thead>
        <tbody>${log.map(e=>`
          <tr><td style="color:var(--text2);font-size:11px">${e.date}</td><td>${e.label}</td><td class="pos">🐔 +${e.chickens ?? e.xp ?? 0}</td></tr>
        `).join('')}</tbody>
      </table>
    </div>` : ''}
  `;
}

// ─── Init ──────────────────────────────────────────────────────────────────────
renderRecruiter();
rcInitSync();
setInterval(renderRecruiter, 5000);
</script>
</body>
</html>
