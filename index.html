<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Farm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0b0e08;
  --surface:     #13180e;
  --surface2:    #191f12;
  --surface3:    #212917;
  --border:      rgba(210,175,80,0.13);
  --border-hi:   rgba(210,175,80,0.36);
  --gold:        #d4aa4a;
  --gold-bright: #f0c855;
  --gold-dim:    rgba(212,170,74,0.55);
  --gold-glow:   rgba(212,170,74,0.13);
  --gold-glow2:  rgba(212,170,74,0.06);
  --mint:        #3ddc97;
  --mint-dim:    rgba(61,220,151,0.5);
  --mint-glow:   rgba(61,220,151,0.1);
  --red:         #e05050;
  --blue:        #4db8f5;
  --purple:      #c084fc;
  --yellow:      #fbbf24;
  --text:        #ede3c8;
  --text2:       rgba(237,227,200,0.42);
  --text3:       rgba(237,227,200,0.18);
  --r:           14px;
  --r-sm:        8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  min-height: 100vh;
}

/* Subtle vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,170,74,0.04) 0%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(212,170,74,0.18); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(212,170,74,0.35); }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,14,8,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-hi);
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 35%, var(--gold-bright) 50%, var(--gold) 65%, transparent 100%);
  opacity: 0.4;
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-bright);
  text-shadow: 0 0 20px rgba(240,200,85,0.4), 0 0 40px rgba(240,200,85,0.15);
  white-space: nowrap;
}

#hud {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
}
.hud-stat {
  display: flex; align-items: center; gap: 6px;
  color: var(--text2);
}
.hud-stat span { color: var(--text); font-size: 13px; }
.hud-stat.eggs span { color: var(--mint); }
.hud-stat.rate { font-size: 11px; color: var(--mint-dim); }

/* ── Main ── */
main {
  position: relative; z-index: 1;
  max-width: 980px;
  margin: 0 auto;
  padding: 28px 24px 48px;
}

/* ── Section label ── */
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border-hi), transparent);
}

/* ── Cards ── */
.card {
  background: linear-gradient(160deg, var(--surface2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  opacity: 0.6;
}
.card:hover {
  border-color: var(--border-hi);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(212,170,74,0.06);
}
.card-icon {
  font-size: 22px;
  margin-bottom: 8px;
  line-height: 1;
}
.card-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  font-family: 'Share Tech Mono', monospace;
  margin-bottom: 6px;
}
.card-value {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px;
  font-weight: 400;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}
.card-sub {
  font-size: 12px;
  color: var(--text2);
}

/* ── Grids ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }

/* ── Progress bar ── */
.prog-wrap {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 99px;
  overflow: hidden;
  margin: 10px 0 6px;
}
.prog-fill {
  height: 100%;
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 30px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35));
  border-radius: 99px;
}

/* ── Farm scene ── */
.rc-farm-scene {
  position: relative;
  width: 100%;
  height: 220px;
  overflow: hidden;
  border-radius: var(--r);
  border: 1px solid var(--border-hi);
  margin-bottom: 20px;
  box-shadow: inset 0 -40px 60px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
}
.rc-farm-label {
  position: absolute; top: 12px; left: 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  z-index: 5;
}
.rc-farm-tier-badge {
  position: absolute; top: 10px; right: 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(4px);
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 5;
}

/* ── Task list ── */
.tasks-wrap { display: flex; flex-direction: column; gap: 4px; }
.rc-task {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: var(--r-sm);
  cursor: pointer;
  border: 1px solid transparent;
  transition: background .15s, border-color .15s, opacity .2s;
  position: relative;
}
.rc-task::before {
  content: '';
  position: absolute;
  left: 0; top: 25%; bottom: 25%;
  width: 3px;
  border-radius: 99px;
  background: var(--gold);
  opacity: 0;
  transition: opacity .15s;
}
.rc-task:hover { background: var(--surface2); border-color: var(--border); }
.rc-task:hover::before { opacity: 0.5; }
.rc-task.done { opacity: 0.45; }
.rc-task.done .rc-task-label { text-decoration: line-through; }
.rc-task.done::before { background: var(--mint); opacity: 0.6; }

.rc-task-check {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1.5px solid var(--border-hi);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--mint);
  flex-shrink: 0;
  transition: background .15s, border-color .15s;
}
.rc-task.done .rc-task-check {
  background: rgba(61,220,151,0.15);
  border-color: var(--mint-dim);
}
.rc-task-body { flex: 1; min-width: 0; }
.rc-task-label { font-size: 13px; font-weight: 500; color: var(--text); }
.rc-task-desc  { font-size: 11px; color: var(--text2); margin-top: 1px; }
.rc-task-reward {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--gold-bright);
  background: var(--gold-glow);
  border: 1px solid rgba(212,170,74,0.2);
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Upgrades ── */
.upg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.rc-upg {
  background: linear-gradient(140deg, var(--surface3) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: border-color .2s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.rc-upg::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  border-radius: var(--r) var(--r) 0 0;
  background: var(--accent, var(--gold));
  opacity: 0.5;
  transition: opacity .2s;
}
.rc-upg.can-afford {
  border-color: rgba(61,220,151,0.3);
  box-shadow: 0 0 20px rgba(61,220,151,0.06);
}
.rc-upg.can-afford::before { opacity: 0.8; }

.rc-upg-header { display: flex; align-items: center; gap: 10px; }
.rc-upg-icon { font-size: 24px; line-height: 1; }
.rc-upg-title { flex: 1; }
.rc-upg-name  { font-size: 13px; font-weight: 600; color: var(--text); }
.rc-upg-level { font-size: 10px; color: var(--text2); font-family: 'Share Tech Mono', monospace; margin-top: 1px; }
.rc-upg-desc  { font-size: 12px; color: var(--text2); }
.rc-upg-next  { font-size: 12px; color: var(--mint); font-weight: 500; }

.rc-upg-bar-wrap { height: 4px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; }
.rc-upg-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

.rc-upg-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 2px; }
.rc-upg-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--border-hi);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.rc-upg-btn:hover:not([disabled]):not(.maxed) {
  border-color: var(--gold-dim);
  background: var(--gold-glow);
  color: var(--gold-bright);
}
.rc-upg-btn[disabled] { opacity: 0.25; cursor: not-allowed; }
.rc-upg-btn.maxed {
  color: var(--mint);
  border-color: var(--mint-dim);
  background: var(--mint-glow);
  cursor: default;
}

/* ── Log table ── */
.log-table { width: 100%; border-collapse: collapse; }
.log-table th {
  text-align: left; padding: 7px 12px;
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--gold-dim);
  border-bottom: 1px solid var(--border-hi);
  font-family: 'Share Tech Mono', monospace;
}
.log-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
.log-table tr:last-child td { border-bottom: none; }
.log-table tr:hover td { background: rgba(212,170,74,0.03); }
.pos { color: var(--mint); }

/* ── Animations ── */
@keyframes rc-bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes rc-roll {
  0%,100% { transform: rotate(-12deg); }
  50%      { transform: rotate(12deg); }
}
@keyframes rc-hatch-pop {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  55%  { opacity: 1; transform: translateY(-32px) scale(1.4); }
  100% { opacity: 0; transform: translateY(-52px) scale(0.8); }
}
@keyframes rc-glow-pulse {
  0%,100% { filter: drop-shadow(0 0 0px rgba(61,220,151,0)); }
  50%      { filter: drop-shadow(0 0 8px rgba(61,220,151,0.8)); }
}
@keyframes rc-star-twinkle {
  0%,100% { opacity: 0.15; transform: scale(1); }
  50%      { opacity: 0.7; transform: scale(1.4); }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.rc-chicken-sprite {
  position: absolute; bottom: 40px; font-size: 20px;
  line-height: 1; user-select: none; pointer-events: none;
  animation: rc-bob var(--bob-dur,1.2s) ease-in-out infinite;
  animation-delay: var(--bob-delay,0s);
}
.rc-egg-sprite {
  display: inline-block;
  animation: rc-roll var(--roll-dur,2s) ease-in-out infinite;
  animation-delay: var(--roll-delay,0s);
}
.rc-eggs-glow { animation: rc-glow-pulse 2.2s ease-in-out infinite; display: inline-block; }

#farm-content { animation: fade-up 0.25s ease both; }
.spacer { height: 14px; }

/* ── Mobile ── */
@media (max-width: 680px) {
  .grid2, .grid4, .upg-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; }
  #hud { display: none; }
  main { padding: 16px 14px 40px; }
  .rc-farm-scene { height: 160px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🌾 Career Farm</div>
  <div id="hud">
    <div class="hud-stat" id="hud-chickens">🐔 <span>—</span></div>
    <div class="hud-stat eggs" id="hud-eggs">🥚 <span>—</span></div>
    <div class="hud-stat rate" id="hud-rate"></div>
  </div>
</header>

<main>
  <div id="farm-content"><div style="color:var(--text2);padding:40px;text-align:center;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-family:'Share Tech Mono',monospace">Loading…</div></div>
</main>

<script>
const RC_DAILY = [
  { id:'d1', label:'Send 3 outreach messages',            desc:'Cold email, LinkedIn DM, or referral ask',              chickens:4 },
  { id:'d2', label:'Research 2 target companies',         desc:'Their stack, culture, and open roles',                  chickens:3 },
  { id:'d3', label:'Practice a STAR story out loud',      desc:'Pick one behavioral question and rehearse it',          chickens:3 },
  { id:'d4', label:'Shortlist 3 new job postings',        desc:'Find and save 3 roles worth applying to',               chickens:2 },
  { id:'d5', label:'Read 1 industry article',             desc:'Stay current on trends in your field',                  chickens:2 },
  { id:'d6', label:'Log a recent win to resume/LinkedIn', desc:'Add metrics, a new project, or updated skills',         chickens:4 },
];
const RC_WEEKLY = [
  { id:'w1', label:'Submit 5+ quality applications',      desc:'Tailored, not spray-and-pray',                          chickens:15 },
  { id:'w2', label:'Complete a mock interview',           desc:'Technical or behavioral — record yourself if possible', chickens:12 },
  { id:'w3', label:'Conduct an informational interview',  desc:'Schedule or complete a coffee chat',                    chickens:10 },
  { id:'w4', label:'Follow up on pending applications',   desc:'Any application >1 week without a response',            chickens:8  },
  { id:'w5', label:'Tailor resume for a dream role',      desc:'Customize bullets and skills for a specific JD',        chickens:10 },
  { id:'w6', label:'Expand your network',                 desc:'Connect with 5 new relevant people on LinkedIn',        chickens:7  },
];
const RC_TIERS = [
  { name:'Backyard Coop',        icon:'🏠', min:0   },
  { name:'Small Farm',           icon:'🌾', min:10  },
  { name:'Ranch',                icon:'🏡', min:30  },
  { name:'Enterprise Farm',      icon:'🏭', min:80  },
  { name:'Mega Corp',            icon:'🌆', min:200 },
  { name:'Global Egg Syndicate', icon:'🌍', min:500 },
];
const RC_UPGRADES = [
  { id:'hatchBoost',    name:'Hatch Booster',       desc:'More chickens hatch per task',          icon:'🐣', maxLevel:5, costs:[25,80,200,500,1200],   labels:['+1/task','+2/task','+3/task','+5/task','+8/task']  },
  { id:'feedQuality',   name:'Premium Feed',         desc:'Chickens produce eggs faster',          icon:'🌾', maxLevel:5, costs:[30,100,300,750,2000],  labels:['×1.25','×1.6','×2.0','×2.5','×3.0']               },
  { id:'coopExpansion', name:'Coop Expansion',        desc:'Raise your max chicken capacity',       icon:'🏠', maxLevel:5, costs:[50,150,400,1000,2500], labels:['Cap:100','Cap:200','Cap:500','Cap:1k','Cap:∞']      },
  { id:'researchLab',   name:'Career Research Lab',   desc:'Bonus chickens from weekly tasks',      icon:'🔬', maxLevel:3, costs:[120,400,1200],         labels:['+3 weekly','+6 weekly','+12 weekly']               },
];

function rcLoad() { try { return JSON.parse(localStorage.getItem('rc_state') || '{}'); } catch { return {}; } }
function rcSave(s) { s._savedAt = Date.now(); localStorage.setItem('rc_state', JSON.stringify(s)); }
function rcSyncToServer(s) { fetch('/api/state', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(s) }).catch(()=>{}); }
function rcSaveAndSync(s) { rcSave(s); rcSyncToServer(s); }
async function rcInitSync() {
  try {
    const resp = await fetch('/api/state');
    if (!resp.ok) return;
    const srv = await resp.json();
    if (!srv || srv.error) return;
    const loc = rcLoad();
    if ((srv._savedAt||0) > (loc._savedAt||0)) {
      localStorage.setItem('rc_state', JSON.stringify(srv));
      renderRecruiter();
    } else if ((loc._savedAt||0) > (srv._savedAt||0)) {
      rcSyncToServer(loc);
    }
  } catch(_) {}
}
function rcToday() { return new Date().toISOString().slice(0,10); }
function rcWeekKey() {
  const d = new Date(), jan1 = new Date(d.getFullYear(),0,1);
  const w = Math.ceil(((d-jan1)/86400000 + jan1.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(w).padStart(2,'0')}`;
}
function rcTier(c) { let t=RC_TIERS[0]; for(const x of RC_TIERS) if(c>=x.min) t=x; return t; }
function rcChickenCap(u) { return [50,100,200,500,1000,Infinity][(u.coopExpansion||0)]; }
function rcEggsPerSec(c,u) { return c*0.1*[1,1.25,1.6,2.0,2.5,3.0][(u.feedQuality||0)]; }
function rcChickensForTask(task,u,isW) { return task.chickens+[0,1,2,3,5,8][(u.hatchBoost||0)]+(isW?[0,3,6,12][(u.researchLab||0)]:0); }
function rcTickEggs(s) {
  const now=Date.now(), last=s.lastEggTime||now, elapsed=Math.min((now-last)/1000,3600);
  if(elapsed>0&&(s.chickens||0)>0){const e=rcEggsPerSec(s.chickens,s.upgrades||{})*elapsed;s.eggs=(s.eggs||0)+e;s.eggsTotal=(s.eggsTotal||0)+e;}
  s.lastEggTime=now;
}
function rcMigrate(s) {
  if((s.xp||0)>0&&!(s.chickens>0)){s.chickens=Math.floor(s.xp/5);s.eggs=(s.eggs||0)+s.chickens*2;delete s.xp;}
  if(!s.upgrades) s.upgrades={};
  if(!s.lastEggTime) s.lastEggTime=Date.now();
  return s;
}

function rcToggleTask(type,id) {
  let s=rcLoad(); s=rcMigrate(s); rcTickEggs(s);
  const today=rcToday(),week=rcWeekKey(),isW=type==='weekly';
  const list=isW?RC_WEEKLY:RC_DAILY, storeKey=isW?'weekly':'daily', timeKey=isW?week:today;
  const task=list.find(t=>t.id===id); if(!task) return;
  const tasks=s[storeKey]||{}, k=`${timeKey}:${id}`, cap=rcChickenCap(s.upgrades);
  let spawned=0;
  if(tasks[k]) {
    const was=(typeof tasks[k]==='object')?(tasks[k].chickens||0):0;
    s.chickens=Math.max(0,(s.chickens||0)-was);
    delete tasks[k];
    s.log=(s.log||[]).filter(e=>e.key!==k);
  } else {
    spawned=Math.min(rcChickensForTask(task,s.upgrades,isW),Math.max(0,cap-(s.chickens||0)));
    s.chickens=(s.chickens||0)+spawned;
    tasks[k]={chickens:spawned};
    s.log=[{key:k,date:today,label:task.label,chickens:spawned},...(s.log||[])].slice(0,50);
  }
  s[storeKey]=tasks; rcSaveAndSync(s); renderRecruiter();
  if(spawned>0) rcShowHatchFloat(spawned);
}

function rcShowHatchFloat(n) {
  const scene=document.querySelector('.rc-farm-scene'); if(!scene) return;
  const el=document.createElement('div');
  el.textContent=`+${n} 🐔`;
  const left=18+Math.random()*46;
  el.style.cssText=`position:absolute;left:${left}%;bottom:52px;font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:#f0c855;pointer-events:none;animation:rc-hatch-pop 0.9s ease-out forwards;z-index:20;white-space:nowrap;text-shadow:0 0 10px rgba(240,200,85,0.8)`;
  scene.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

function rcBuyUpgrade(id) {
  let s=rcLoad(); s=rcMigrate(s); rcTickEggs(s);
  const upg=RC_UPGRADES.find(u=>u.id===id); if(!upg) return;
  const lv=s.upgrades[id]||0; if(lv>=upg.maxLevel) return;
  const cost=upg.costs[lv]; if((s.eggs||0)<cost) return;
  s.eggs-=cost; s.upgrades[id]=lv+1;
  rcSaveAndSync(s); renderRecruiter();
}

function renderRecruiter() {
  let s=rcLoad(); s=rcMigrate(s); rcTickEggs(s); rcSave(s);

  const today=rcToday(), week=rcWeekKey();
  const daily=s.daily||{}, weekly=s.weekly||{};
  const chickens=s.chickens||0, eggs=s.eggs||0, upgrades=s.upgrades||{};
  const eggsPerSec=rcEggsPerSec(chickens,upgrades);
  const cap=rcChickenCap(upgrades);
  const tier=rcTier(chickens), tierIdx=RC_TIERS.indexOf(tier);
  const nextTier=RC_TIERS[tierIdx+1]||null;
  const tierPct=nextTier?Math.round((chickens-tier.min)/(nextTier.min-tier.min)*100):100;
  const dailyDone=RC_DAILY.filter(t=>daily[`${today}:${t.id}`]).length;
  const weeklyDone=RC_WEEKLY.filter(t=>weekly[`${week}:${t.id}`]).length;
  const fmtEggs=n=>n>=10000?`${(n/1000).toFixed(1)}k`:n.toFixed(1);

  // Update HUD
  const hudC=document.getElementById('hud-chickens'), hudE=document.getElementById('hud-eggs'), hudR=document.getElementById('hud-rate');
  if(hudC) hudC.innerHTML=`🐔 <span>${chickens.toLocaleString()}</span>`;
  if(hudE) hudE.innerHTML=`🥚 <span>${fmtEggs(eggs)}</span>`;
  if(hudR) hudR.textContent=eggsPerSec>0?`+${eggsPerSec.toFixed(2)}/s`:'';

  // Tier themes — richer atmosphere
  const themes = [
    { sky:'linear-gradient(180deg,#120a02 0%,#2e1a05 60%,#3d2a0a 100%)', ground:'#3a2608', gb:'#6a4512', barn:'#7a4a2a', roof:'#5a3018', silo:'#5a4018', moon:'#d4aa4a' },
    { sky:'linear-gradient(180deg,#040e04 0%,#0a1e08 60%,#142a0c 100%)', ground:'#1a3808', gb:'#28520e', barn:'#7a3232', roof:'#5a2020', silo:'#4a5820', moon:'#aad46a' },
    { sky:'linear-gradient(180deg,#050e04 0%,#0c2209 60%,#183010 100%)', ground:'#16420e', gb:'#226016', barn:'#8a3e20', roof:'#6a2e18', silo:'#386838', moon:'#c8e898' },
    { sky:'linear-gradient(180deg,#040610 0%,#080e22 60%,#0e1430 100%)', ground:'#141428', gb:'#1e1e40', barn:'#3a4858', roof:'#2a3248', silo:'#303850', moon:'#8ab4f8' },
    { sky:'linear-gradient(180deg,#07030f 0%,#10061c 60%,#180a28 100%)', ground:'#160820', gb:'#221438', barn:'#4a2868', roof:'#321e58', silo:'#3a3468', moon:'#c084fc' },
    { sky:'linear-gradient(180deg,#0f0800 0%,#221200 60%,#301800 100%)', ground:'#281400', gb:'#442200', barn:'#7a6000', roof:'#4a3a00', silo:'#584a00', moon:'#fbbf24' },
  ];
  const th=themes[tierIdx]||themes[0];

  const starCounts=[0,0,6,10,16,22];
  const numStars=starCounts[tierIdx]||0;
  const starHTML=Array.from({length:numStars},(_,i)=>{
    const top=6+(i*17%45), left=4+(i*23%78);
    const dur=(2.2+(i*0.35%1.8)).toFixed(1), del=(-(i*0.6%3)).toFixed(1);
    const sz=i%3===0?7:5;
    return `<span style="position:absolute;top:${top}%;left:${left}%;font-size:${sz}px;color:#fff;user-select:none;pointer-events:none;animation:rc-star-twinkle ${dur}s ease-in-out infinite;animation-delay:${del}s">★</span>`;
  }).join('');

  const moonHTML=tierIdx>=2?`<div style="position:absolute;top:12%;right:12%;width:${14+tierIdx*2}px;height:${14+tierIdx*2}px;border-radius:50%;background:radial-gradient(circle,${th.moon} 0%,${th.moon}88 50%,transparent 100%);box-shadow:0 0 ${8+tierIdx*4}px ${th.moon}66;opacity:0.8;z-index:2"></div>`:'';

  const numChickens=Math.min(chickens,16);
  const chickenHTML=Array.from({length:numChickens},(_,i)=>{
    const left=5+(i*71%60), dur=(1.0+i*0.17%0.65).toFixed(2), del=(-(i*0.38%1.6)).toFixed(2);
    return `<span class="rc-chicken-sprite" style="left:${left}%;--bob-dur:${dur}s;--bob-delay:${del}s">🐔</span>`;
  }).join('');

  const numEggs=Math.min(Math.floor(Math.log2(eggs+1)),10);
  const eggPileHTML=numEggs>0?Array.from({length:numEggs},(_,i)=>{
    const del=(-(i*0.38%2.0)).toFixed(2), sz=i<5?15:12;
    return `<span class="rc-egg-sprite" style="--roll-delay:${del}s;font-size:${sz}px">🥚</span>`;
  }).join(''):'';

  const farmScene=`
  <div class="rc-farm-scene">
    <div style="position:absolute;inset:0;background:${th.sky}"></div>
    ${moonHTML}
    ${starHTML}
    <div style="position:absolute;bottom:0;left:0;right:0;height:44px;background:${th.ground};border-top:2px solid ${th.gb}"></div>
    <div style="position:absolute;bottom:44px;left:14%;width:2px;height:60px;background:${th.silo};opacity:0.6"></div>
    <div style="position:absolute;bottom:44px;right:100px;width:22px;height:52px;background:${th.silo};border-radius:12px 12px 0 0;opacity:0.9"></div>
    <div style="position:absolute;bottom:44px;right:28px">
      <div style="width:0;height:0;border-left:32px solid transparent;border-right:32px solid transparent;border-bottom:22px solid ${th.roof}"></div>
      <div style="width:64px;height:34px;background:${th.barn};border-radius:3px 3px 0 0;position:relative">
        <div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);width:12px;height:20px;background:rgba(0,0,0,0.5);border-radius:3px 3px 0 0"></div>
        <div style="position:absolute;top:8px;left:10px;width:8px;height:8px;background:rgba(255,255,255,0.08);border-radius:2px"></div>
        <div style="position:absolute;top:8px;right:10px;width:8px;height:8px;background:rgba(255,255,255,0.08);border-radius:2px"></div>
      </div>
    </div>
    ${chickenHTML}
    ${eggPileHTML?`<div style="position:absolute;bottom:42px;left:18px;display:flex;align-items:flex-end;gap:2px">${eggPileHTML}</div>`:''}
    <div class="rc-farm-label">Career Farm</div>
    <div class="rc-farm-tier-badge">${tier.icon} ${tier.name}</div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:44px;background:linear-gradient(0deg,rgba(0,0,0,0.3),transparent);pointer-events:none"></div>
  </div>`;

  function taskRows(type,map,list,timeKey) {
    const isW=type==='weekly';
    return list.map(t=>{
      const done=!!map[`${timeKey}:${t.id}`];
      const n=rcChickensForTask(t,upgrades,isW);
      return `<div class="rc-task${done?' done':''}" onclick="rcToggleTask('${type}','${t.id}')">
        <div class="rc-task-check">${done?'✓':''}</div>
        <div class="rc-task-body">
          <div class="rc-task-label">${t.label}</div>
          <div class="rc-task-desc">${t.desc}</div>
        </div>
        <div class="rc-task-reward">🐔 +${n}</div>
      </div>`;
    }).join('');
  }

  const upgAccent={hatchBoost:'#f0c855',feedQuality:'#3ddc97',coopExpansion:'#4db8f5',researchLab:'#c084fc'};
  function upgradeCard(upg) {
    const lv=upgrades[upg.id]||0, maxed=lv>=upg.maxLevel;
    const cost=maxed?null:upg.costs[lv];
    const canAfford=!maxed&&eggs>=cost;
    const accent=upgAccent[upg.id]||'var(--gold)';
    const barPct=Math.round(lv/upg.maxLevel*100);
    return `<div class="rc-upg${canAfford?' can-afford':''}" style="--accent:${accent}">
      <div class="rc-upg-header">
        <div class="rc-upg-icon">${upg.icon}</div>
        <div class="rc-upg-title">
          <div class="rc-upg-name">${upg.name}</div>
          <div class="rc-upg-level">Level ${lv} / ${upg.maxLevel}</div>
        </div>
      </div>
      <div class="rc-upg-desc">${upg.desc}</div>
      <div class="rc-upg-next">${maxed?'✓ Maxed out':`Next: ${upg.labels[lv]}`}</div>
      <div class="rc-upg-bar-wrap"><div class="rc-upg-bar-fill" style="width:${barPct}%;background:${accent}88"></div></div>
      <div class="rc-upg-footer">
        ${maxed
          ?`<div class="rc-upg-btn maxed">✓ Max</div>`
          :`<button class="rc-upg-btn" onclick="rcBuyUpgrade('${upg.id}')" ${canAfford?'':'disabled'}>🥚 ${cost.toLocaleString()}</button>`}
      </div>
    </div>`;
  }

  const log=(s.log||[]).slice(0,8);

  document.getElementById('farm-content').innerHTML = `
    ${farmScene}

    <div class="grid2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-label">Flock Size</div>
        <div class="card-value" style="color:var(--yellow)">${chickens.toLocaleString()}</div>
        <div class="prog-wrap">
          <div class="prog-fill" style="width:${tierPct}%;background:linear-gradient(90deg,var(--gold),var(--gold-bright))"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="card-sub">${tier.icon} ${tier.name}</div>
          <div class="card-sub">${cap===Infinity?'∞':cap.toLocaleString()} cap</div>
        </div>
        ${nextTier
          ?`<div style="margin-top:6px;font-size:11px;color:var(--text2)">${chickens-tier.min} / ${nextTier.min-tier.min} to ${nextTier.icon} ${nextTier.name}</div>`
          :`<div style="margin-top:6px;font-size:11px;color:var(--mint)">Max tier reached 🎉</div>`}
      </div>

      <div class="card">
        <div class="card-label">Egg Wallet</div>
        <div class="card-value ${eggsPerSec>0?'rc-eggs-glow':''}" style="color:var(--mint)">${fmtEggs(eggs)}</div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
          ${eggsPerSec>0?`<span style="font-size:11px;font-family:'Share Tech Mono',monospace;color:var(--mint);background:var(--mint-glow);border:1px solid var(--mint-dim);padding:2px 10px;border-radius:99px">+${eggsPerSec.toFixed(2)}/s</span>`:''}
        </div>
        <div class="card-sub" style="margin-top:6px">${fmtEggs(s.eggsTotal||0)} lifetime earned</div>
        <div class="card-sub">${dailyDone}/${RC_DAILY.length} daily · ${weeklyDone}/${RC_WEEKLY.length} weekly</div>
      </div>
    </div>

    <div class="section-label">Upgrades</div>
    <div class="upg-grid" style="margin-bottom:20px">
      ${RC_UPGRADES.map(upgradeCard).join('')}
    </div>

    <div class="grid2" style="margin-bottom:20px">
      <div>
        <div class="section-label">Daily Quests <span style="color:var(--text3);font-size:9px;letter-spacing:1px;font-family:'Inter',sans-serif;text-transform:none">${dailyDone}/${RC_DAILY.length} · resets midnight</span></div>
        <div class="tasks-wrap">${taskRows('daily',daily,RC_DAILY,today)}</div>
      </div>
      <div>
        <div class="section-label">Weekly Quests <span style="color:var(--text3);font-size:9px;letter-spacing:1px;font-family:'Inter',sans-serif;text-transform:none">${weeklyDone}/${RC_WEEKLY.length} · resets monday</span></div>
        <div class="tasks-wrap">${taskRows('weekly',weekly,RC_WEEKLY,week)}</div>
      </div>
    </div>

    ${log.length?`
    <div class="section-label">Activity Log</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="log-table">
        <thead><tr><th>Date</th><th>Task</th><th>Hatched</th></tr></thead>
        <tbody>${log.map(e=>`
          <tr>
            <td style="color:var(--text2);font-family:'Share Tech Mono',monospace;font-size:11px">${e.date}</td>
            <td>${e.label}</td>
            <td class="pos" style="font-family:'Share Tech Mono',monospace">🐔 +${e.chickens??e.xp??0}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`:''}
  `;
}

renderRecruiter();
rcInitSync();
setInterval(renderRecruiter, 5000);
</script>
</body>
</html>
